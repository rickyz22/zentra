<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentra CRM - Login</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 10px; margin-bottom: 24px;">
                <img src="assets/logo.png" style="width: 80px; height: 80px; object-fit: contain;" alt="Zentra Logo">
                <span style="font-size: 2.2rem; font-weight: 900; color: white; letter-spacing: -0.05em;">Zentra</span>
            </div>
            <p class="text-slate-500 text-sm mt-2">Ingresa tus credenciales para continuar</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Usuario</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-500"></i>
                        <input type="text" id="username" required placeholder="Nombre de usuario" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Contraseña</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-slate-500"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div id="errorMsg" class="hidden text-rose-500 text-xs font-bold bg-rose-500/10 p-4 rounded-xl border border-rose-500/20 text-center animate-pulse">
                    Credenciales incorrectas
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-600/20 transition-all active:scale-[0.98] flex items-center justify-center group">
                    Iniciar Sesión
                    <i data-lucide="arrow-right" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase font-bold tracking-widest">
            &copy; 2026 Powered by Zentra Systems
        </p>
    </div>

    <script>
        lucide.createIcons();

        // Si ya tiene sesión, mandarlo al dashboard
        if (localStorage.getItem('jony_token')) {
            window.location.href = '/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.ok) {
                    localStorage.setItem('jony_token', data.token);
                    localStorage.setItem('jony_user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.msg || 'Error al iniciar sesión';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión con el servidor';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
