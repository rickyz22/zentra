<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentra CRM - Login</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#020617] relative flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <!-- Luces de fondo (Mesh Gradient Effects) -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[120px] rounded-full"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo / Branding -->
        <div class="text-center mb-10 translate-y-[-10px] animate-in fade-in slide-in-from-top-4 duration-700">
            <div class="flex flex-col items-center justify-center gap-4 mb-6">
                <div class="p-4 bg-white/5 rounded-[2rem] border border-white/10 shadow-2xl">
                    <img src="assets/logo.png" class="w-16 h-16 object-contain" alt="Zentra Logo">
                </div>
                <h1 class="text-5xl font-black text-white tracking-tighter">Zentra</h1>
            </div>
            <p class="text-slate-500 text-xs uppercase font-black tracking-[0.3em]">Corporate Intelligence</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900/50 backdrop-blur-2xl border border-white/10 p-10 rounded-[3rem] shadow-[0_0_50px_rgba(0,0,0,0.3)] animate-in fade-in zoom-in-95 duration-500">
            <form id="loginForm" class="space-y-8">
                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Acceso de Usuario</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-5 top-4 w-5 h-5 text-slate-600 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="username" required placeholder="Nombre de usuario" 
                            class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-4 pl-14 pr-4 text-white placeholder:text-slate-700 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Llave de Seguridad</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-5 top-4 w-5 h-5 text-slate-600 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-slate-950/50 border border-white/5 rounded-2xl py-4 pl-14 pr-4 text-white placeholder:text-slate-700 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div id="errorMsg" class="hidden text-rose-500 text-[10px] font-black uppercase tracking-widest bg-rose-500/5 p-4 rounded-2xl border border-rose-500/20 text-center">
                    Credenciales invalidas
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-2xl shadow-blue-600/20 transition-all active:scale-[0.98] flex items-center justify-center group uppercase tracking-widest text-xs">
                    Entrar al Sistema
                    <i data-lucide="chevron-right" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-700 text-[9px] mt-10 uppercase font-black tracking-[0.4em]">
            &copy; 2026 Zentra Deluxe Enterprise
        </p>
    </div>

    <script>
        lucide.createIcons();

        // Si ya tiene sesión, mandarlo al dashboard
        if (localStorage.getItem('jony_token')) {
            window.location.href = '/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.ok) {
                    localStorage.setItem('jony_token', data.token);
                    localStorage.setItem('jony_user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.msg || 'Error al iniciar sesión';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión con el servidor';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
